# Visualization after inference (see inference_viz/inference_visualizer.py)

enabled: true
output_format: grounding_dino
output_folder: "temp output"
save_path: null

box_width: 3
font_size: 14
legend_padding: 12
legend_swatch_size: 18
legend_text_gap: 8
legend_row_gap: 8
legend_min_width: 120
legend_bg: "#F0F0F0"
legend_text_color: "#1a1a1a"
legend_divider_color: "#CCCCCC"

show_inference_prompt: true
prompt_font_size: 12
prompt_text_color: "#333333"
prompt_section_gap: 14
prompt_line_gap: 5
prompt_bottom_padding: 12

line_color: "#FF0000"
line_width: 4
show: false
